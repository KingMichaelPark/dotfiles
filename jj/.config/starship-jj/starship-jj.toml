module_separator = " "
reset_color = false

[bookmarks]
search_depth = 50
exclude = []

[[module]]
type = "Symbol"
symbol = "󱗆"
color = "Blue"

[[module]]
type = "Bookmarks"
separator = " "
color = "Magenta"
behind_symbol = "⇡"
surround_with_quotes = false
ignore_empty_commits = "None"

[[module]]
type = "Commit"
previous_message_symbol = "⇣"
max_length = 24
show_previous_if_empty = false
empty_text = ""
surround_with_quotes = false

[module.non_unique]
color = "Black"

[[module]]
type = "State"
separator = " "

[module.conflict]
disabled = false
text = "󰞇"
color = "Red"

[module.divergent]
disabled = false
text = "󰤻"
color = "Cyan"

[module.empty]
disabled = false
text = ""
color = "Yellow"

[module.immutable]
disabled = false
text = "󰌾"
color = "Yellow"

[module.hidden]
disabled = false
text = "󰗹"
color = "Yellow"

[[module]]
type = "Metrics"
template = "{changed}{added}{removed}"
hide_if_empty = true
color = "Magenta"

[module.changed_files]
prefix = "~"
suffix = " "
color = "Cyan"

[module.added_lines]
prefix = "+"
suffix = " "
color = "Green"

[module.removed_lines]
prefix = "-"
suffix = " "
color = "Red"

