[signing]
behaviour = "own"
backend = "ssh"
key = "~/.ssh/id_ed25519.pub"
backends.ssh.program = "/usr/bin/ssh-keygen"
backends.ssh.allowed-signers = "~/.ssh/allowed_signers"

[user]
name = "Michael Park"
email = "mike@mhpark.me"

[ui]
default-command = ["log"]
pager = "delta"
editor = "nvim"
diff-foramter = ":git"

[git]
subprocess = true
sign-on-push = true


[revset-aliases]
"immutable_heads()" = "builtin_immutable_heads() | (trunk().. & ~mine())"
