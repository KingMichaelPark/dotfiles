palette = "catppuccin_mocha"

format = '$all'
# Starship modules
[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[(green)ÔØ»](sapphire)"
error_symbol = "[(red)ÔØ»](sapphire)"
vimcmd_symbol = "[ÔØ«](pink)" # For use with zsh-vi-mode

[git_branch]
format = "[$branch]($style)"
symbol = "´Éİ "
style = "bold surface2"

[directory]
truncation_length = 4
style = "bold lavender"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](mauve) ($ahead_behind$stashed)]($style)"
style = "teal"
conflicted = "ÔÇï"
untracked = "ÔÇï"
modified = "ÔÇï"
staged = "ÔÇï"
renamed = "ÔÇï"
deleted = "ÔÇï"
stashed = "Ôëí"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "surface2"

[cmd_duration]
format = "[$duration]($style) "
style = "flamingo"

[python]
format = "[$symbol $version ](yellow)[$virtualenv]($style) "
style = "surface2"
symbol = "¯êÁ "

