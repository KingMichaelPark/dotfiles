# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

[cmd_duration]
format = "[$duration]($style) "

[character]
success_symbol = "[έζ▒](purple)"
error_symbol = "[έζ▒](red)"
vimcmd_symbol = "[έζ░](green)"

[directory]
style = "blue"
read_only = " ≤░Ν╛"

[git_branch]
format = "[$branch]($style)"
style = "gray"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "έΑΜ"
untracked = "έΑΜ"
modified = "έΑΜ"
staged = "έΑΜ"
renamed = "έΑΜ"
deleted = "έΑΜ"
stashed = "έΚκ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"


