# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

format = '$all'
# Starship modules
# Note the use of Catppuccin color 'peach'
success_symbol = "[(green) έζψ](peach)"
error_symbol = "[(red) έζψ](peach)"
vimcmd_symbol = "[(blue) έζχ](subtext1)" # For use with zsh-vi-mode

[git_branch]
format = "[$branch]($style)"
symbol = "ΎΡα "
style = "bold mauve"

[directory]
truncation_length = 4
style = "bold lavender"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](mauve) ($ahead_behind$stashed)]($style)"
conflicted = "έΑΜ"
untracked = "έΑΜ"
modified = "έΑΜ"
staged = "έΑΜ"
renamed = "έΑΜ"
deleted = "έΑΜ"
stashed = "έΚκ"
style = "surface1"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
format = "[$duration]($style) "
style = "blue"

[python]
format = "[$symbol $version ](yellow)[$virtualenv]($style) "
