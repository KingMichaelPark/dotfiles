[buildPlans.Park]
family = "Park"
spacing = "term"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

  [buildPlans.Park.variants]
  inherits = "ss08"

    [buildPlans.Park.variants.design]
    six = "open-contour"
    seven = "curly-serifless"
    eight = "crossing-asymmetric"
    nine = "straight-bar"
    zero = "oval-dotted"
    capital-g = "toothless-rounded-serifless-hooked"
    capital-r = "curly-serifless"
    capital-w = "curly-serifless"
    capital-x = "curly-serifless"
    capital-y = "curly-serifless"
    a = "double-storey-serifless"
    f = "serifless"
    g = "double-storey"
    h = "straight-serifless"
    i = "serifless"
    k = "curly-serifless"
    q = "top-cut-tailed-serifless"
    r = "serifless"
    u = "toothless-rounded-serifless"
    y = "curly-serifless"
    z = "curly-serifless"
    asterisk = "penta-mid"
    brace = "curly"
    ampersand = "closed"
    decorative-angle-brackets = "middle"
    lig-neq = "slightly-slanted"
    lig-equal-chain = "without-notch"
    lig-plus-chain = "without-notch"
    lig-double-arrow-bar = "without-notch"

  [buildPlans.Park.ligations]
  inherits = "dlig"

[buildPlans.Park.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Park.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Park.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Park.widths.SemiExtended]
shape = 548
menu = 6
css = "semi-expanded"

[buildPlans.Park.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Park.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
