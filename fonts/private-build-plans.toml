[buildPlans.HunterMono]
family = "Hunter Mono"
spacing = "term"
serifs = "sans"
noCvSs = false
exportGlyphNames = false

  [buildPlans.HunterMono.variants]
  inherits = "ss01"

    [buildPlans.HunterMono.variants.design]
    four = "closed-serifless"
    zero = "dotted"
    capital-b = "standard-serifless"
    capital-g = "toothless-corner-serifless-hooked"
    a = "double-storey-serifless"
    f = "flat-hook-serifless"
    g = "single-storey-top-cut"
    i = "serifed-flat-tailed"
    l = "serifed-flat-tailed"
    t = "bent-hook-short-neck"
    lig-ltgteq = "slanted"

  [buildPlans.HunterMono.ligations]
  inherits = "dlig"

[buildPlans.HunterMono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.HunterMono.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.HunterMono.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.HunterMono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.HunterMono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
