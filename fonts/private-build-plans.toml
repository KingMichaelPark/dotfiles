[buildPlans.Park]
family = "Park"
spacing = "term"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

  [buildPlans.Park.variants]
  inherits = "ss04"

    [buildPlans.Park.variants.design]
    a = "double-storey-serifless"
    e = "flat-crossbar"
    f = "flat-hook-serifless"
    i = "hooky"
    m = "serifless"
    n = "straight-serifless"
    q = "straight-serifless"
    u = "toothless-rounded-serifless"
    lig-ltgteq = "slanted"
    lig-equal-chain = "without-notch"

    [buildPlans.Park.variants.italic]
    a = "single-storey-serifless"
    e = "flat-crossbar"
    f = "flat-hook-serifless"
    i = "serifed-flat-tailed"
    k = "cursive-serifless"
    m = "earless-rounded-double-arch-serifless"
    n = "earless-rounded-straight-serifless"
    q = "straight-serifless"
    u = "toothless-rounded-serifless"
    lig-ltgteq = "slanted"
    lig-equal-chain = "without-notch"

  [buildPlans.Park.ligations]
  inherits = "dlig"

[buildPlans.Park.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Park.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Park.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Park.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Park.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
