[buildPlans.huntermono]
family = "Hunter Mono"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = true

hintParams = ["-a", "qqq"]

    [buildPlans.huntermono.widths.normal]
    shape = 500
    menu  = 5
    css   = "normal"

    [buildPlans.huntermono.metricOverride]
    leading = 1100
    xHeight = 550

    [buildPlans.huntermono.ligations]
    inherits="dlig"
    enables = [
        "eqslasheq",
        "kern-dotty",
        "kern-bars",
        "llggeq",
         "--fast-chaining--"
    ]
    disables = ["slash-asterisk"]

    [buildPlans.huntermono.variants]
    inherits = "ss08"

    [buildPlans.huntermono.weights.regular]
    shape = 425
    menu = 400
    css = 400

    [buildPlans.huntermono.weights.semibold]
    shape = 600
    menu = 600
    css = 600

    [buildPlans.huntermono.weights.bold]
    shape = 800
    menu = 700
    css = 700

    [buildPlans.huntermono.weights.black]
    shape = 900
    menu = 900
    css = 900

    [buildPlans.huntermono.slopes]
    upright = "default.Upright"
    italic = "default.Italic"
