[buildPlans.HunterMono]
family = "Hunter Mono"
spacing = "term"
serifs = "sans"
noCvSs = false
exportGlyphNames = false

[buildPlans.HunterMono.variants]
inherits = "ss08"

[buildPlans.HunterMono.variants.design]
zero = "oval-tall-reverse-slashed"
capital-a = "curly-serifless"
capital-m = "hanging-serifless"
capital-n = "asymmetric-serifless"
a = "double-storey-serifless"
f = "serifless"
g = "single-storey-serifless"
i = "hooky"
l = "serifed-flat-tailed"
q = "tailed-serifless"
y = "curly-turn-serifless"
caret = "medium"
at = "threefold"
dollar = "open"
percent = "rings-continuous-slash"
question = "smooth"
lig-neq = "slightly-slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"
lig-plus-chain = "without-notch"
lig-double-arrow-bar = "without-notch"
lig-single-arrow-bar = "without-notch"

[buildPlans.HunterMono.variants.italic]
zero = "oval-tall-reverse-slashed"
capital-a = "curly-serifless"
capital-m = "hanging-serifless"
capital-n = "asymmetric-serifless"
a = "single-storey-serifless"
f = "serifless"
g = "single-storey-serifless"
k = "curly-serifless"
q = "tailed-serifless"
y = "curly-turn-serifless"
lig-neq = "slightly-slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"
lig-plus-chain = "without-notch"
lig-double-arrow-bar = "without-notch"
lig-single-arrow-bar = "without-notch"

[buildPlans.HunterMono.ligations]
inherits = "dlig"

[buildPlans.HunterMono.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.HunterMono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.HunterMono.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.HunterMono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.HunterMono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
