[buildPlans.Hunter]
family = "Hunter"
spacing = "term"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

  [buildPlans.Hunter.variants]
  inherits = "ss08"

    [buildPlans.Hunter.variants.design]
