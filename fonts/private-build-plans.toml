    eight = "crossing-asymmetric"
    nine = "straight-bar"
    zero = "oval-tall-slashed"
    capital-g = "toothless-rounded-serifless-hooked"
    capital-n = "asymmetric-serifless"
    capital-q = "curly-tailed"
    capital-r = "curly-serifless"
    capital-w = "curly-serifless"
    capital-x = "curly-serifless"
    capital-y = "curly-serifless"
    a = "double-storey-serifless"
    b = "toothed-serifless"
    d = "toothed-serifless"
    f = "serifless"
    g = "single-storey-serifless"
    h = "straight-serifless"
    i = "serifless"
    j = "serifed"
    k = "straight-serifless"
    l = "serifed-flat-tailed"
    m = "serifless"
    n = "straight-serifless"
    p = "eared-serifless"
    q = "earless-corner-tailed-serifless"
    r = "serifless"
    t = "bent-hook"
    u = "toothed-serifless"
    y = "curly-serifless"
    z = "curly-serifless"
    asterisk = "penta-mid"
    paren = "normal"
    brace = "straight"
    guillemet = "straight"
    number-sign = "upright"
    ampersand = "upper-open"
    percent = "rings-continuous-slash"
    decorative-angle-brackets = "middle"
    lig-neq = "slightly-slanted"
    lig-equal-chain = "without-notch"
    lig-hyphen-chain = "without-notch"
    lig-plus-chain = "without-notch"
    lig-double-arrow-bar = "without-notch"
    lig-single-arrow-bar = "without-notch"

    [buildPlans.Hunter.variants.italic]
    six = "straight-bar"
    seven = "curly-serifless"
    eight = "crossing-asymmetric"
    nine = "straight-bar"
    zero = "oval-tall-slashed"
    capital-g = "toothless-rounded-serifless-hooked"
    capital-r = "curly-serifless"
    capital-w = "curly-serifless"
    capital-x = "curly-serifless"
    capital-y = "curly-serifless"
    a = "double-storey-serifless"
    b = "toothed-serifless"
    d = "toothed-serifless"
    f = "tailed"
    g = "single-storey-serifless"
    h = "straight-serifless"
    i = "serifless"
    k = "cursive-serifless"
    l = "serifed-flat-tailed"
    q = "top-cut-diagonal-tailed-serifless"
    r = "serifless"
    u = "toothed-serifless"
    x = "curly-serifless"
    y = "curly-turn-serifless"
    z = "curly-serifless"
    asterisk = "penta-high"
    paren = "normal"
    brace = "straight"
    guillemet = "straight"
    number-sign = "upright"
    ampersand = "upper-open"
    percent = "rings-continuous-slash"
    decorative-angle-brackets = "middle"
    lig-neq = "slightly-slanted"
    lig-equal-chain = "without-notch"
    lig-hyphen-chain = "without-notch"
    lig-plus-chain = "without-notch"
    lig-double-arrow-bar = "without-notch"
    lig-single-arrow-bar = "without-notch"

  [buildPlans.Hunter.ligations]
  inherits = "dlig"

[buildPlans.Hunter.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Hunter.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.Hunter.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Hunter.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Hunter.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Hunter.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
